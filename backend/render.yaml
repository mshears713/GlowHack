services:
  - type: web
    name: officeios-legal-research
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: OPENAI_API_KEY
        scope: secret
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
